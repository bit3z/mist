# .github/workflows/FX-telegram-processor.yml
name: FX Telegram Processor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        type: choice
        options:
          - process_queue
          - setup_webhook
          - check_status

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Git
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "FX Bot"
      
      - name: Setup Webhook
        if: github.event.inputs.mode == 'setup_webhook'
        env:
          URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "Setting up webhook..."
          curl -s "$URL/setup-webhook" | jq '.'
      
      - name: Process Queue
        if: github.event.inputs.mode == 'process_queue'
        env:
          URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          for i in {1..50}; do
            # Get queue count
            COUNT=$(curl -s "$URL/queue-count" | jq -r '.count // 0')
            echo "Queue: $COUNT messages"
            
            if [ "$COUNT" = "0" ]; then
              echo "Done!"
              break
            fi
            
            # Process one
            RESULT=$(curl -s -X POST "$URL/process-one")
            echo "$RESULT" | jq '{status: .status, messageId: .messageId, issue: .issue_number, remaining: .queue_remaining}'
            
            # Commit if changes
            if git status --porcelain | grep -q "tg/"; then
              git add tg/
              git commit -m "FX: Processed message [skip ci]"
              git push
            fi
            
            sleep 2
          done
      
      - name: Check Status
        if: github.event.inputs.mode == 'check_status'
        env:
          URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "Status:"
          curl -s "$URL/status" | jq '.'
          echo ""
          echo "Queue:"
          curl -s "$URL/queue-count" | jq '.'
      
      - name: Final Commit
        if: always()
        run: |
          if git status --porcelain | grep -q "tg/"; then
            git add tg/
            git commit -m "FX: Final update [skip ci]"
            git push
          fi
