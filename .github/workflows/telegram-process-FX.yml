# .github/workflows/FX-telegram-processor.yml
name: FX Telegram Message Processor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Processing mode'
        required: true
        type: choice
        options:
          - init_fx_structure
          - process_queue
          - process_message
          - setup_webhook
          - check_status
      message_id:
        description: 'Message ID (required for process_message mode)'
        required: false
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Initialize FX Structure
        if: github.event.inputs.mode == 'init_fx_structure'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "🚀 Initializing FX bot file structure, progress tracking, and message queue..."
          
          RESPONSE=$(curl -s -X POST "${CLOUDFLARE_WORKER_URL}/init-fx" \
            -H "Content-Type: application/json")
          
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq '.'
          
          if echo "$RESPONSE" | jq -e '.success' > /dev/null; then
            echo "✅ FX structure initialized successfully!"
          else
            echo "❌ FX structure initialization failed!"
            exit 1
          fi
      
      - name: Process Queued FX Messages
        if: github.event.inputs.mode == 'process_queue'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "🔄 Processing queued FX messages from webhook..."
          
          RESPONSE=$(curl -s -X POST "${CLOUDFLARE_WORKER_URL}/process-queue" \
            -H "Content-Type: application/json")
          
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq '.'
          
          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "❌ Queue processing failed!"
            exit 1
          else
            echo "✅ Queue processed: $(echo $RESPONSE | jq -r '.processed') messages"
          fi
      
      - name: Process Specific FX Message
        if: github.event.inputs.mode == 'process_message'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          MESSAGE_ID="${{ github.event.inputs.message_id }}"
          echo "🔍 Processing specific FX message ID: $MESSAGE_ID"
          
          if [ -z "$MESSAGE_ID" ]; then
            echo "❌ Error: message_id is required"
            exit 1
          fi
          
          RESPONSE=$(curl -s -X POST "${CLOUDFLARE_WORKER_URL}/process-message" \
            -H "Content-Type: application/json" \
            -d "{\"messageId\": $MESSAGE_ID}")
          
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq '.'
      
      - name: Setup FX Webhook
        if: github.event.inputs.mode == 'setup_webhook'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "🔗 Setting up FX Telegram webhook (removing any existing webhooks)..."
          
          RESPONSE=$(curl -s "${CLOUDFLARE_WORKER_URL}/setup-webhook")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq '.'
          
          if echo "$RESPONSE" | jq -e '.ok' > /dev/null; then
            echo "✅ Webhook setup successful!"
          else
            echo "❌ Webhook setup failed!"
            exit 1
          fi
      
      - name: Check FX Status
        if: github.event.inputs.mode == 'check_status'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "📊 Checking FX bot status..."
          
          RESPONSE=$(curl -s "${CLOUDFLARE_WORKER_URL}/status")
          echo "Status: $RESPONSE"
          echo "$RESPONSE" | jq '.'
      
      - name: Commit FX updates
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ $(git status --porcelain | grep "tg/FX-files/") ]]; then
            git add tg/FX-files/
            git commit -m "FX Bot: Update progress and files [skip ci]"
            git push
            echo "✅ FX updates committed"
          else
            echo "ℹ️ No FX changes to commit"
          fi
